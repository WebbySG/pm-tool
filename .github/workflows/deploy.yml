name: Deploy to VPS (manual fallback)

# Deploys now happen pull-based ON the VPS via cron (scripts/deploy.sh), because
# GitHub-hosted runners can't reliably SSH into the VPS (port 22 i/o timeout).
# This SSH workflow is kept as a MANUAL fallback only — run it from the Actions
# tab via "Run workflow". It no longer fires on every push (so no more red failures).
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /root/pm-tool
            git pull origin master
            npm install --production=false
            npm run build
            pm2 restart pm-tool
